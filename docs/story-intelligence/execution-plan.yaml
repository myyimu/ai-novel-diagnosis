schema_version: "agent-execution-plan.v2"
document_version: "1.2.0"
status: "in-progress"
last_updated: "2026-07-17"
last_acceptance_audit: "2026-07-17"
project_root: "E:/ai-novel-diagnosis"
objective: "复用现有整书 Map-Reduce 和证据索引，把整书编辑方法蒸馏成作者可确认、可改稿、可保存真实版本并可独立复诊的故事体检。"
authoritative_plan: "docs/story-intelligence/implementation-plan.md"

required_reading:
  - "AGENTS.md"
  - "docs/product-doctrine.md"
  - "docs/story-intelligence/implementation-plan.md"
  - "docs/story-intelligence/model-protocol.md"
  - "docs/story-intelligence/README.md"

current_state:
  story_audit_implemented: "partial"
  shared_book_result_contract: false
  shared_story_audit_contract: true
  existing_job_system: "BookAnalysisJobService"
  existing_result_storage: "book_analysis_jobs.result jsonb"
  existing_evidence_index: "BookAnalysisResult.mapReduce.chunkEvidenceIndex"
  project_has_book_job_link: true
  finding_review_persistence: "implemented-unit-tested-integration-pending"
  project_health_route: false
  current_active_task: "SIA-004"

implementation_status_legend:
  accepted: "验收标准成立且相关质量门通过。"
  partial: "已有实现，但至少一个任务验收标准尚未成立。"
  in_progress: "存在进行中的未提交实现，且当前质量门未全部通过。"
  not_started: "未发现可验收实现。"

validation_snapshot:
  audited_at: "2026-07-17"
  ai_core:
    status: "passed"
    tests: "56/56"
    gates:
      - "check"
      - "test"
      - "build"
  web:
    status: "passed"
    tests: "91/91"
    gates:
      - "check"
      - "test"
      - "build"
    note: "构建路由中尚无 /project/health。"
  api:
    status: "passed"
    tests: "224/224"
    passed_gates:
      - "lint"
      - "typecheck"
      - "format"
      - "test"
      - "build"
  workspace:
    status: "story-audit-in-progress"
    note: "SIA-005 的适用 API 门禁已通过；整体 Story Audit 尚未达到发布定义。"

next_execution:
  resume_order:
    - "SIA-004"
    - "SIA-003"
    - "SIA-006"
  immediate_exit_criteria:
    - "在模型 reduce 失败时仍返回 coverage 和确定性对话统计。"
    - "把运行中 partial chapter maps 派生成 partial Story Audit。"
    - "补齐 SIA-004 的失败与 partial 回归测试后再改为 accepted。"

decisions:
  analysis_result_path: "BookAnalysisResult.storyAudit"
  job_api: "/analysis/book/jobs"
  create_parallel_job_system: false
  create_parallel_cache: false
  purpose_default_for_backward_compatibility: "reference-study"
  own_draft_default_profiles:
    - "statistics"
    - "continuity"
    - "structure"
    - "character"
  human_review_is_separate_from_job_result: true
  whole_book_score: false
  max_verified_candidates_per_book: 20

non_goals:
  - "预测平台流量、签约或商业成功"
  - "用固定故事模板判定作品好坏"
  - "自动重写整本小说"
  - "让 QuickReviewResult 承载整书体检字段"
  - "首版承诺真正的单章增量重算"
  - "新建重复的上传、任务、缓存、人物图谱、时间线或证据索引"
  - "用指标大屏、总分或同模型自评替代编辑判断"
  - "把缓存诊断历史当作真实改稿版本或修改效果"

guardrails:
  - "保留用户当前未提交改动。"
  - "Controller 只做路由和 DTO 解析。"
  - "数据库只允许 repository 访问。"
  - "模型 quote 必须由服务端回查，offset 必须由服务端计算。"
  - "StoryAuditResult 不保存人工 reviewState。"
  - "partial 结果不得生成全书缺失结论。"
  - "禁止 any、console.log、吞错和业务层 process.env。"
  - "公共 API 变更必须有测试和 changeset。"
  - "禁止 git add -A。"
  - "finding 必须关联编辑标准、证据、替代解释和作者决定。"
  - "复诊必须比较真实 V1/V2；正文 hash 未变化或缓存命中不得创建版本。"
  - "工程 fixture 通过不得表述为产品有效性验证。"

milestones:
  - id: "mvp"
    name: "可信故事体检纵切"
    tasks:
      - "SIA-001"
      - "SIA-002"
      - "SIA-003"
      - "SIA-004"
      - "SIA-005"
      - "SIA-006"
      - "SIA-007"
      - "SIA-008"
    release_outcome: "我的作品可获得对话统计、时间冲突、双证据和人工复核。"
  - id: "advanced"
    name: "结构、人物与漏洞"
    tasks:
      - "SIA-009"
      - "SIA-010"
      - "SIA-011"
      - "SIA-012"
    release_outcome: "结构图、人设一致性、人物弧光、剧情漏洞进入作者确认、真实版本改稿、独立复诊和导出闭环。"

tasks:
  - id: "SIA-001"
    title: "共享契约与确定性对话统计"
    implementation_status: "accepted"
    audit_note: "公共契约、复核状态分离、确定性统计、测试与 changeset 均已验证；ai-core 56/56 测试及 check/build 通过。"
    depends_on: []
    scope:
      create:
        - "packages/ai-core/src/story-audit.ts"
        - "packages/ai-core/src/story-audit.test.ts"
        - "packages/ai-core/src/dialogue-statistics.ts"
        - "packages/ai-core/src/dialogue-statistics.test.ts"
        - ".changeset/add-story-audit-contract.md"
      modify:
        - "packages/ai-core/src/index.ts"
    acceptance:
      - "四类引号、嵌套、跨段、未闭合和排除类型有测试。"
      - "StoryAuditFinding 与 StoryAuditFindingReview 分离。"
      - "ai-core check/test/build 通过。"

  - id: "SIA-002"
    title: "任务用途、profiles 与缓存版本"
    implementation_status: "accepted"
    audit_note: "基础输入、默认值、任务恢复和缓存版本语义已验收；Web 用户入口与实际传参由 SIA-008 负责。"
    depends_on:
      - "SIA-001"
    scope:
      modify:
        - "services/api/src/modules/analysis/dto/analyze-book.dto.ts"
        - "services/api/src/modules/analysis/dto/create-book-job-from-upload.dto.ts"
        - "services/api/src/modules/book/book-analysis-job.service.ts"
        - "services/api/src/modules/book/book.controller.ts"
        - "apps/web/src/lib/workspace-analysis-client.ts"
        - "apps/web/src/lib/workspace-cache.ts"
        - "apps/web/src/stores/workspace-store.ts"
    acceptance:
      - "旧请求默认 reference-study。"
      - "purpose/profiles 非法输入返回 400。"
      - "缓存键包含 purpose、profiles、schema 和 prompt 版本。"

  - id: "SIA-003"
    title: "项目关联和人工复核持久化"
    implementation_status: "partial"
    audit_note: "迁移、关联字段、review repository/service/controller 与单元测试已存在；缺 HTTP/E2E、真实迁移/刷新验收，analysisPurpose DTO 仍为 string。"
    depends_on:
      - "SIA-002"
    scope:
      create:
        - "services/api/src/dao/repositories/story-audit-review.repository.ts"
        - "services/api/src/modules/story-audit/dto/review-story-audit-finding.dto.ts"
        - "services/api/src/modules/story-audit/story-audit-review.controller.ts"
      modify:
        - "services/api/src/service/drizzle/schema.ts"
        - "services/api/src/modules/workspace/dto/workspace-assets.dto.ts"
        - "services/api/src/modules/workspace/workspace-assets.repository.ts"
        - "apps/web/src/stores/workspace-store.ts"
      generated:
        - "services/api/drizzle/migrations/<generated-story-audit-migration>.sql"
    acceptance:
      - "WorkspaceProject 可恢复 bookJobId 和 analysisPurpose。"
      - "finding review 可幂等 upsert 且刷新后存在。"
      - "revision session 可关联 storyAuditFindingIds。"

  - id: "SIA-004"
    title: "故事体检纵切接入现有 BookAnalysisJob"
    implementation_status: "partial"
    audit_note: "成功路径已嵌入 coverage/dialogue，profiles 已参与执行分流；模型或 reduce 失败时仍不能独立返回确定性统计，任务运行中的 partial Story Audit 尚未接入。"
    depends_on:
      - "SIA-001"
      - "SIA-002"
    scope:
      create:
        - "services/api/src/modules/story-audit/story-audit.module.ts"
        - "services/api/src/modules/story-audit/story-audit-orchestrator.service.ts"
        - "services/api/src/modules/story-audit/story-audit-orchestrator.service.spec.ts"
      modify:
        - "services/api/src/modules/book/book.module.ts"
        - "services/api/src/modules/book/book-analysis.service.ts"
        - "apps/web/src/stores/workspace-store.ts"
    acceptance:
      - "不增加新任务系统或轮询端点。"
      - "结果嵌入 BookAnalysisResult.storyAudit。"
      - "模型失败时 coverage 和对话统计仍可返回。"

  - id: "SIA-005"
    title: "章节 Map 原子事实扩展"
    implementation_status: "accepted"
    audit_note: "轻索引与深拆均抽取受限事件/事实；服务端双层验证 quote/offset，丢弃无锚点显式事实并拒绝模型自封 author-canon；coverage/profile 语义与旧整书回归已通过，API 224/224 测试及 check/build 通过。"
    depends_on:
      - "SIA-004"
    scope:
      modify:
        - "services/api/src/modules/book/book-analysis.service.ts"
        - "services/api/src/modules/book/book-analysis.service.spec.ts"
        - "services/api/src/modules/story-audit/story-audit-orchestrator.service.ts"
    acceptance:
      - "事件和事实只基于当前可见章节。"
      - "explicit-text 事实全部有有效 sourceAnchor。"
      - "旧整书 fixture 和导出保持兼容。"

  - id: "SIA-006"
    title: "全局时间图与冲突规则"
    implementation_status: "not_started"
    depends_on:
      - "SIA-005"
    scope:
      create:
        - "services/api/src/modules/story-audit/story-graph.service.ts"
        - "services/api/src/modules/story-audit/story-graph.service.spec.ts"
        - "fixtures/story-audit/timeline-manifest.json"
    acceptance:
      - "线性时间和倒叙不误报。"
      - "时间环、年龄矛盾、同时异地生成双证据 candidate。"
      - "unknown 时间不被强制日期化。"

  - id: "SIA-007"
    title: "候选复核器"
    implementation_status: "not_started"
    depends_on:
      - "SIA-006"
    scope:
      create:
        - "services/api/src/modules/story-audit/story-audit-verifier.service.ts"
        - "services/api/src/modules/story-audit/story-audit-verifier.service.spec.ts"
    acceptance:
      - "未知 anchorId 被拒绝。"
      - "证据不足不得 verified。"
      - "每本最多复核 20 个候选。"
      - "模型不可用时保留 candidate 并标明未复核。"

  - id: "SIA-008"
    title: "首个可发布 Web 纵切"
    implementation_status: "not_started"
    depends_on:
      - "SIA-003"
      - "SIA-004"
      - "SIA-007"
    scope:
      create:
        - "apps/web/src/app/project/health/page.tsx"
        - "apps/web/src/components/workspace/project/story-audit/StoryAuditPage.tsx"
        - "apps/web/src/components/workspace/project/story-audit/StoryAuditOverview.tsx"
        - "apps/web/src/components/workspace/project/story-audit/ContinuityPanel.tsx"
        - "apps/web/src/components/workspace/project/story-audit/TextStatisticsPanel.tsx"
        - "apps/web/src/components/workspace/project/story-audit/FindingInspector.tsx"
      modify:
        - "apps/web/src/components/workspace/research/ResearchBookPage.tsx"
        - "apps/web/src/components/workspace/project/ProjectAssetTabs.tsx"
        - "apps/web/src/lib/workspace-routes.ts"
        - "apps/web/src/hooks/use-workspace-handlers.ts"
        - "apps/web/src/lib/workspace-analysis-client.ts"
    acceptance:
      - "我的作品进入 project/health，参考作品旧流程不变。"
      - "双证据可回跳。"
      - "人工复核刷新后存在。"
      - "新组件使用设计 token。"

  - id: "SIA-009"
    title: "剧情结构视图"
    implementation_status: "not_started"
    depends_on:
      - "SIA-005"
      - "SIA-008"
    scope:
      create:
        - "services/api/src/modules/story-audit/story-structure.service.ts"
        - "apps/web/src/components/workspace/project/story-audit/StructurePanel.tsx"
      reuse:
        - "apps/web/src/lib/book-comprehension.ts"
        - "apps/web/src/lib/relationship-graph.ts"
    acceptance:
      - "剧情线矩阵、时间切换和伏笔回收边有证据。"
      - "未选择模板时不评分。"

  - id: "SIA-010"
    title: "人物状态与人物弧光"
    implementation_status: "not_started"
    depends_on:
      - "SIA-005"
      - "SIA-008"
    scope:
      create:
        - "services/api/src/modules/story-audit/character-ledger.service.ts"
        - "services/api/src/modules/story-audit/character-arc.service.ts"
        - "apps/web/src/components/workspace/project/story-audit/CharacterPanel.tsx"
    acceptance:
      - "合理成长、伪装和情境变化不被规则直接判错。"
      - "每个弧光变化点有 scene/chapter 和 evidence。"
      - "不生成人物成长总分。"

  - id: "SIA-011"
    title: "剧情漏洞候选"
    implementation_status: "not_started"
    depends_on:
      - "SIA-007"
      - "SIA-009"
      - "SIA-010"
    scope:
      create:
        - "services/api/src/modules/story-audit/plot-gap-detector.service.ts"
        - "services/api/src/modules/story-audit/plot-gap-detector.service.spec.ts"
    acceptance:
      - "高优候选至少双证据或正文证据加 canon。"
      - "partial 输入不生成全书 dropped_goal/unresolved_setup 结论。"
      - "默认顶部最多 3 个 finding。"

  - id: "SIA-012"
    title: "复诊、导出、评测与发布"
    implementation_status: "not_started"
    depends_on:
      - "SIA-008"
      - "SIA-009"
      - "SIA-010"
      - "SIA-011"
    scope:
      modify:
        - "services/api/src/modules/book/book-export.service.ts"
        - "services/api/src/modules/workspace/workspace-assets-export.ts"
        - "apps/web/src/components/workspace/project/ProjectRevisionsPage.tsx"
        - "apps/web/src/components/workspace/project/ProjectExportPage.tsx"
        - "README.md"
        - "docs/architecture.md"
        - "docs/feature-prioritization-and-design-slots.md"
      create:
        - "fixtures/story-audit/README.md"
        - "fixtures/story-audit/manifest.json"
    acceptance:
      - "时间冲突高优 precision >= 0.85。"
      - "人物/剧情漏洞高优 precision >= 0.70。"
      - "Markdown/JSON 导出不包含全文。"
      - "全仓 check/test/build 和 one:doctor 通过。"

