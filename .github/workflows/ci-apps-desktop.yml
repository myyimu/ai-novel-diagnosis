# Generated by One CLI
name: CI - desktop

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/ci-apps-desktop.yml'
  push:
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/ci-apps-desktop.yml'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ./apps/desktop/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run pnpm run lint
        run: pnpm run lint
      - name: Run pnpm run format
        run: pnpm run format
      - name: Run pnpm run build
        run: pnpm run build
