# Generated by One CLI
name: CI - api

on:
  pull_request:
    paths:
      - 'services/api/**'
      - '.github/workflows/ci-services-api.yml'
  push:
    paths:
      - 'services/api/**'
      - '.github/workflows/ci-services-api.yml'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ./services/api/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run pnpm run check
        run: pnpm run check
      - name: Run pnpm run test
        run: pnpm run test
      - name: Run pnpm run build
        run: pnpm run build
